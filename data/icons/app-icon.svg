<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#5b8def"/>
      <stop offset="1" stop-color="#2b5fd0"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8fd3ff"/>
      <stop offset="0.55" stop-color="#4aa8f0"/>
      <stop offset="1" stop-color="#6f7bf0"/>
    </linearGradient>
    <linearGradient id="bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6edf7"/>
    </linearGradient>
    <linearGradient id="stand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef3fb"/>
      <stop offset="1" stop-color="#c9d6ea"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0a2a66" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg)"/>
  <!-- Top sheen -->
  <rect x="24" y="24" width="464" height="230" rx="112" fill="#ffffff" opacity="0.06"/>

  <!-- Secondary monitor, tucked behind to the upper-left -->
  <g filter="url(#soft)" transform="translate(120,150)">
    <rect x="0" y="0" width="150" height="104" rx="16" fill="url(#bezel)"/>
    <rect x="12" y="12" width="126" height="80" rx="8" fill="url(#wall)"/>
    <rect x="12" y="12" width="126" height="34" rx="8" fill="#ffffff" opacity="0.14"/>
  </g>

  <!-- Main monitor -->
  <g filter="url(#soft)">
    <!-- Screen -->
    <rect x="196" y="150" width="216" height="150" rx="20" fill="url(#bezel)"/>
    <rect x="212" y="166" width="184" height="118" rx="10" fill="url(#wall)"/>
    <!-- Screen highlight -->
    <rect x="212" y="166" width="184" height="50" rx="10" fill="#ffffff" opacity="0.16"/>
    <!-- Stand -->
    <rect x="288" y="300" width="32" height="34" fill="url(#stand)"/>
    <rect x="246" y="332" width="116" height="20" rx="10" fill="url(#stand)"/>
  </g>
</svg>
